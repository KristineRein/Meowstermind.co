<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Original Stickers</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="stylesheet.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
  <link rel="manifest" href="img/site.webmanifest">
</head>
<body>

  <!-- HEADER LOAD -->
  <div id="header"></div>

  <!-- PAGE CONTENT -->
   
  <main class="original-sticker-page">
  <section class="hero"></section>
    <section class="product-section">
        <h2 class="section-title">Products</h2>

  <div class="product-grid">

    <!-- CARD 1 -->
    <div class="product-card">
      <div class="image-box">
        <img src="img/sticker1.jpg" alt="Sticker 1" class="img-front" />
        <img src="img/sticker1-hover.jpg" alt="Sticker 1 Hover" class="img-back" />
      </div>
      <p class="category">Original Sticker</p>
      <h3 class="product-name">Cute Cat Sticker Pack</h3>
      <p class="price">₱ 50.00</p>
    </div>

    <!-- CARD 2 -->
    <div class="product-card">
      <div class="image-box">
        <img src="img/sticker2.jpg" alt="Sticker 2" class="img-front" />
        <img src="img/sticker2-hover.jpg" alt="Sticker 2 Hover" class="img-back" />
      </div>
      <p class="category">Original Sticker</p>
      <h3 class="product-name">Aesthetic Flower Stickers</h3>
      <p class="price">₱ 60.00</p>
    </div>

    <!-- CARD 3 -->
    <div class="product-card">
      <div class="image-box">
        <img src="img/sticker3.jpg" alt="Sticker 3" class="img-front" />
        <img src="img/sticker3-hover.jpg" alt="Sticker 3 Hover" class="img-back" />
      </div>
      <p class="category">Original Sticker</p>
      <h3 class="product-name">Kawaii Food Stickers</h3>
      <p class="price">₱ 55.00</p>
    </div>

    <!-- CARD 4 -->
    <div class="product-card">
      <div class="image-box">
        <img src="img/sticker4.jpg" alt="Sticker 4" class="img-front" />
        <img src="img/sticker4-hover.jpg" alt="Sticker 4 Hover" class="img-back" />
      </div>
      <p class="category">Original Sticker</p>
      <h3 class="product-name">Minimal Line Art Stickers</h3>
      <p class="price">₱ 45.00</p>
    </div>

  </div>

</section>
  </main>

  <!-- FOOTER LOAD -->
  <div id="footer"></div>

  <!-- JS -->
  <script src="js/main.js"></script>

</body>
</html>
